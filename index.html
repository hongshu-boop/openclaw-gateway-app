<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #58a6ff, #238636);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 600;
            color: #f0f6fc;
        }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #21262d;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8b949e;
        }
        
        .status-dot.running {
            background: #3fb950;
            box-shadow: 0 0 8px #3fb950;
        }
        
        .status-dot.stopped {
            background: #f85149;
        }
        
        .container {
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
        }
        
        .card-title {
            font-size: 14px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        
        .control-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #238636;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2ea043;
        }
        
        .btn-danger {
            background: #da3633;
            color: white;
        }
        
        .btn-danger:hover {
            background: #f85149;
        }
        
        .btn-secondary {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }
        
        .btn-secondary:hover {
            background: #30363d;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #21262d;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #8b949e;
        }
        
        .info-value {
            color: #f0f6fc;
            font-family: 'SF Mono', monospace;
        }
        
        .log-container {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            height: 400px;
            overflow-y: auto;
            padding: 16px;
            font-family: 'SF Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #161b22;
        }
        
        .log-time {
            color: #8b949e;
        }
        
        .log-info { color: #58a6ff; }
        .log-success { color: #3fb950; }
        .log-warning { color: #d29922; }
        .log-error { color: #f85149; }
        
        .config-input {
            width: 100%;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-family: 'SF Mono', monospace;
            font-size: 13px;
            margin-bottom: 12px;
        }
        
        .config-input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }
        
        .toast.show {
            display: flex;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #f0f6fc;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">🦞</div>
            <div class="logo-text">OpenClaw Gateway</div>
        </div>
        <div class="status-badge">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">检查中...</span>
        </div>
    </div>
    
    <div class="container">
        <div class="grid">
            <div class="card">
                <div class="card-title">控制面板</div>
                <div class="control-group">
                    <button class="btn btn-primary" id="btnStart" onclick="startGateway()">
                        ▶ 启动
                    </button>
                    <button class="btn btn-danger" id="btnStop" onclick="stopGateway()">
                        ⏹ 停止
                    </button>
                    <button class="btn btn-secondary" id="btnRestart" onclick="restartGateway()">
                        🔄 重启
                    </button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">系统信息</div>
                <div class="info-row">
                    <span class="info-label">版本</span>
                    <span class="info-value" id="version">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">运行时间</span>
                    <span class="info-value" id="uptime">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">进程ID</span>
                    <span class="info-value" id="pid">-</span>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">快速配置</div>
                <input type="text" class="config-input" id="configKey" placeholder="配置项 (如: gateway.port)">
                <input type="text" class="config-input" id="configValue" placeholder="值">
                <button class="btn btn-primary" onclick="saveConfig()">
                    💾 保存配置
                </button>
            </div>
        </div>
        
        <div class="card">
            <div class="section-title">实时日志</div>
            <div class="control-group" style="margin-bottom: 16px;">
                <button class="btn btn-secondary" onclick="refreshLogs()">
                    🔄 刷新
                </button>
                <button class="btn btn-secondary" onclick="clearLogs()">
                    🗑 清空
                </button>
                <button class="btn btn-secondary" onclick="toggleAutoScroll()">
                    <span id="autoScrollText">⏸ 暂停滚动</span>
                </button>
            </div>
            <div class="log-container" id="logContainer">
                <div class="log-entry">
                    <span class="log-time">[--:--:--]</span>
                    <span class="log-info">等待日志数据...</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast">
        <div class="spinner" id="toastSpinner"></div>
        <span id="toastMessage">操作中...</span>
    </div>

    <script>
        // 配置
        const CONFIG = {
            apiBase: 'http://localhost:8080', // 默认API地址
            refreshInterval: 5000, // 状态刷新间隔
            logRefreshInterval: 3000, // 日志刷新间隔
        };
        
        let autoScroll = true;
        let statusTimer = null;
        let logTimer = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkStatus();
            refreshLogs();
            startAutoRefresh();
        });
        
        // 自动刷新
        function startAutoRefresh() {
            statusTimer = setInterval(checkStatus, CONFIG.refreshInterval);
            logTimer = setInterval(refreshLogs, CONFIG.logRefreshInterval);
        }
        
        // 检查网关状态
        async function checkStatus() {
            try {
                // 这里调用实际的API
                const response = await fetch(`${CONFIG.apiBase}/api/status`)
                    .catch(() => ({ ok: false }));
                
                if (response.ok) {
                    const data = await response.json();
                    updateStatusUI(data);
                } else {
                    // 模拟状态（实际使用时删除）
                    updateStatusUI({
                        running: Math.random() > 0.3,
                        version: '2026.4.2',
                        uptime: '2d 5h 32m',
                        pid: 12345
                    });
                }
            } catch (error) {
                console.error('状态检查失败:', error);
            }
        }
        
        // 更新状态UI
        function updateStatusUI(data) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (data.running) {
                dot.className = 'status-dot running';
                text.textContent = '运行中';
            } else {
                dot.className = 'status-dot stopped';
                text.textContent = '已停止';
            }
            
            document.getElementById('version').textContent = data.version || '-';
            document.getElementById('uptime').textContent = data.uptime || '-';
            document.getElementById('pid').textContent = data.pid || '-';
        }
        
        // 启动网关
        async function startGateway() {
            showToast('正在启动网关...', true);
            try {
                const response = await fetch(`${CONFIG.apiBase}/api/start`, { method: 'POST' })
                    .catch(() => ({ ok: true })); // 模拟成功
                
                if (response.ok) {
                    showToast('✅ 网关启动成功');
                    setTimeout(checkStatus, 1000);
                } else {
                    showToast('❌ 启动失败');
                }
            } catch (error) {
                showToast('❌ 启动失败: ' + error.message);
            }
        }
        
        // 停止网关
        async function stopGateway() {
            if (!confirm('确定要停止网关吗？')) return;
            
            showToast('正在停止网关...', true);
            try {
                const response = await fetch(`${CONFIG.apiBase}/api/stop`, { method: 'POST' })
                    .catch(() => ({ ok: true })); // 模拟成功
                
                if (response.ok) {
                    showToast('✅ 网关已停止');
                    setTimeout(checkStatus, 1000);
                } else {
                    showToast('❌ 停止失败');
                }
            } catch (error) {
                showToast('❌ 停止失败: ' + error.message);
            }
        }
        
        // 重启网关
        async function restartGateway() {
            showToast('正在重启网关...', true);
            try {
                const response = await fetch(`${CONFIG.apiBase}/api/restart`, { method: 'POST' })
                    .catch(() => ({ ok: true })); // 模拟成功
                
                if (response.ok) {
                    showToast('✅ 网关重启成功');
                    setTimeout(checkStatus, 2000);
                } else {
                    showToast('❌ 重启失败');
                }
            } catch (error) {
                showToast('❌ 重启失败: ' + error.message);
            }
        }
        
        // 刷新日志
        async function refreshLogs() {
            const container = document.getElementById('logContainer');
            
            try {
                // 这里调用实际的日志API
                // const response = await fetch(`${CONFIG.apiBase}/api/logs`);
                // const logs = await response.json();
                
                // 模拟日志数据
                const logs = generateMockLogs();
                
                container.innerHTML = logs.map(log => `
                    <div class="log-entry">
                        <span class="log-time">[${log.time}]</span>
                        <span class="log-${log.level}">[${log.level.toUpperCase()}]</span>
                        <span>${log.message}</span>
                    </div>
                `).join('');
                
                if (autoScroll) {
                    container.scrollTop = container.scrollHeight;
                }
            } catch (error) {
                console.error('日志刷新失败:', error);
            }
        }
        
        // 生成模拟日志
        function generateMockLogs() {
            const levels = ['info', 'success', 'warning', 'error'];
            const messages = [
                'Gateway service started',
                'Connected to database',
                'WebSocket server listening on port 8080',
                'New client connected',
                'Processing request...',
                'Request completed successfully',
                'Client disconnected',
                'Health check passed'
            ];
            
            const now = new Date();
            const logs = [];
            
            for (let i = 0; i < 20; i++) {
                const time = new Date(now - i * 30000);
                logs.unshift({
                    time: time.toLocaleTimeString('zh-CN'),
                    level: levels[Math.floor(Math.random() * levels.length)],
                    message: messages[Math.floor(Math.random() * messages.length)]
                });
            }
            
            return logs;
        }
        
        // 清空日志
        function clearLogs() {
            document.getElementById('logContainer').innerHTML = `
                <div class="log-entry">
                    <span class="log-time">[${new Date().toLocaleTimeString('zh-CN')}]</span>
                    <span class="log-info">日志已清空</span>
                </div>
            `;
        }
        
        // 切换自动滚动
        function toggleAutoScroll() {
            autoScroll = !autoScroll;
            document.getElementById('autoScrollText').textContent = 
                autoScroll ? '⏸ 暂停滚动' : '▶ 继续滚动';
        }
        
        // 保存配置
        async function saveConfig() {
            const key = document.getElementById('configKey').value;
            const value = document.getElementById('configValue').value;
            
            if (!key || !value) {
                showToast('❌ 请填写配置项和值');
                return;
            }
            
            showToast('正在保存配置...', true);
            try {
                const response = await fetch(`${CONFIG.apiBase}/api/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, value })
                }).catch(() => ({ ok: true })); // 模拟成功
                
                if (response.ok) {
                    showToast('✅ 配置保存成功');
                    document.getElementById('configKey').value = '';
                    document.getElementById('configValue').value = '';
                } else {
                    showToast('❌ 保存失败');
                }
            } catch (error) {
                showToast('❌ 保存失败: ' + error.message);
            }
        }
        
        // 显示提示
        function showToast(message, loading = false) {
            const toast = document.getElementById('toast');
            const spinner = document.getElementById('toastSpinner');
            const text = document.getElementById('toastMessage');
            
            text.textContent = message;
            spinner.style.display = loading ? 'block' : 'none';
            toast.classList.add('show');
            
            if (!loading) {
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
        }
        
        // 隐藏提示
        function hideToast() {
            document.getElementById('toast').classList.remove('show');
        }
    </script>
</body>
</html>
